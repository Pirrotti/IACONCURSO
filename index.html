  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getFirestore, collection, doc, setDoc, getDocs, deleteDoc, query, orderBy } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

    const firebaseConfig = {
      apiKey: "AIzaSyCp43BC60QMds6EJPDlKU2tNsMEzy87RJg",
      authDomain: "iaconcurso.firebaseapp.com",
      projectId: "iaconcurso",
      storageBucket: "iaconcurso.firebasestorage.app",
      messagingSenderId: "358319536722",
      appId: "1:358319536722:web:062512e44eb406df62fd8b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // ── FIREBASE HELPERS NO ESCOPO GLOBAL ──
    window.fbSave = async (colecao, id, dados) => {
      try {
        await setDoc(doc(db, colecao, String(id)), { ...dados, _id: String(id) });
        return true;
      } catch(e) { console.error('fbSave erro:', e); return false; }
    };

    window.fbDelete = async (colecao, id) => {
      try {
        await deleteDoc(doc(db, colecao, String(id)));
        return true;
      } catch(e) { console.error('fbDelete erro:', e); return false; }
    };

    window.fbLoad = async (colecao) => {
      try {
        const snap = await getDocs(collection(db, colecao));
        return snap.docs.map(d => d.data());
      } catch(e) { console.error('fbLoad erro:', e); return []; }
    };

    // ── CARREGAR DADOS AO INICIAR COM SEGURANÇA ──
    window.carregarDoFirebase = async () => {
      try {
        console.log('Tentando conectar ao Firebase...');
        const [aps, ls, pvs] = await Promise.all([
          window.fbLoad('apostilas'),
          window.fbLoad('leis'),
          window.fbLoad('provas'),
        ]);
        
        window.apostilas = aps.length ? aps.sort((a,b)=>Number(b._id)-Number(a._id)) : [];
        window.leis = ls.length ? ls.sort((a,b)=>Number(b._id)-Number(a._id)) : [];
        window.provas = pvs.length ? pvs.sort((a,b)=>Number(b._id)-Number(a._id)) : [];

        // Ativa a luz verde da API indicando sucesso
        window.fbReady = true;
        const apiDot = document.querySelector('.api-dot');
        if (apiDot) apiDot.classList.add('on');
        const apiVal = document.querySelector('.api-val');
        if (apiVal) apiVal.textContent = 'Conectado';

        // Atualiza a UI se as funções do script principal já existirem
        if(typeof renderApostilas === 'function') renderApostilas();
        if(typeof renderLeis === 'function') renderLeis();
        if(typeof renderProvas === 'function') renderProvas();
        if(typeof renderSessoes === 'function') renderSessoes();
        if(typeof updateCronProgress === 'function') updateCronProgress();

        console.log('✓ Firebase: dados carregados com sucesso!');
      } catch(e) { 
        console.error('Erro crítico ao carregar Firebase:', e); 
      }
    };

    // Inicialização robusta: aguarda o documento estar pronto e executa a sincronização
    document.addEventListener('DOMContentLoaded', () => {
      setTimeout(window.carregarDoFirebase, 400);
    });
  </script>
